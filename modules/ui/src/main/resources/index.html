<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            --top-bar-height: 52px;
            --nav-bar-height: 42px;
            --header-total-height: calc(var(--top-bar-height) + var(--nav-bar-height));
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: none;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        /* ─── Sticky Top Bar ─────────────────────────────────── */

        .top-bar-wrapper {
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }

        .top-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            padding: 0 max(20px, calc((100% - 1200px) / 2));
            height: var(--top-bar-height);
            gap: 16px;
        }

        .top-bar-logo {
            font-size: 1.25rem;
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: -0.3px;
        }

        .top-bar-spacer {
            flex: 1;
        }

        .top-bar-user {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            opacity: 0.9;
            white-space: nowrap;
        }

        .top-bar-user-icon {
            font-size: 1.1rem;
        }

        .language-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border-radius: 0;
            padding: 0;
            margin: 0;
            box-shadow: none;
        }

        .language-selector label {
            display: none;
        }

        .language-selector select {
            width: auto;
            min-width: 100px;
            padding: 4px 8px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 4px;
            font-size: 0.85rem;
            background: rgba(255,255,255,0.15);
            color: white;
            cursor: pointer;
        }

        .language-selector select option {
            color: #333;
            background: white;
        }

        .top-bar .nav-basket-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            padding: 5px 12px;
            margin: 0;
            color: white;
            font-size: 0.9rem;
        }

        .top-bar .nav-basket-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.25);
            transform: none;
            box-shadow: none;
        }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #667eea;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-section {
            margin-bottom: 25px;
        }

        .form-section h3 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: #555;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        select:disabled, input:disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #cccccc !important;
            color: #666666 !important;
        }

        .error-message {
            background-color: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            border-left: 4px solid #c62828;
        }

        .error-list {
            margin: 8px 0 0 20px;
        }

        .success-message {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            border-left: 4px solid #2e7d32;
        }

        .price-section {
            position: sticky;
            top: calc(var(--header-total-height) + 20px);
            max-height: calc(100vh - var(--header-total-height) - 40px);
            display: flex;
            flex-direction: column;
        }

        .price-detail-content {
            display: flex;
            flex-direction: column;
            min-height: 0;
            flex: 1;
            overflow: hidden;
        }

        .price-detail-content > .card:first-child {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .price-detail-content > .card:not(:first-child) {
            margin-top: 12px;
            flex-shrink: 0;
        }

        .price-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .price-display .label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .price-display .amount {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .price-breakdown {
            margin-top: 15px;
        }

        .price-line-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .price-line-item:last-child {
            border-bottom: none;
            font-weight: 600;
            font-size: 1.1rem;
            padding-top: 12px;
            border-top: 2px solid #667eea;
        }

        .price-subtotal-divider {
            border: none;
            border-top: 1px solid #ddd;
            margin: 10px 0 2px;
        }

        .price-subtotal {
            font-weight: 600;
        }

        .component-role-header {
            margin: 16px 0 4px 0;
            color: #667eea;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .finish-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .finish-item {
            border-radius: 6px;
            overflow: hidden;
        }

        .finish-item .checkbox-label {
            border-radius: 6px;
        }

        .finish-item:has(.finish-params[style*="block"]) .checkbox-label {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            border-bottom-color: #c8d0f5;
        }

        .finish-params {
            background-color: #f0f4ff;
            border: 2px solid #c8d0f5;
            border-top: none;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
            padding: 10px 12px;
        }

        .finish-params-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .finish-params-row:last-child {
            margin-bottom: 0;
        }

        .finish-params-label {
            min-width: 110px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #555;
            margin: 0;
        }

        .finish-params-input {
            width: 90px !important;
            padding: 5px 8px !important;
            font-size: 0.9rem;
        }

        .finish-params-select {
            width: auto !important;
            min-width: 150px;
            padding: 5px 8px !important;
            font-size: 0.9rem;
        }

        .finish-params-options {
            display: flex;
            gap: 10px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            padding: 4px 10px;
            border: 1px solid #c8d0f5;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            margin: 0;
            background: white;
            transition: all 0.2s;
        }

        .radio-label:hover {
            border-color: #667eea;
            background-color: #e8edff;
        }

        .radio-label input[type="radio"] {
            width: auto;
            margin-right: 5px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .checkbox-label:hover {
            border-color: #667eea;
            background-color: #f5f7ff;
        }

        .checkbox-label input {
            width: auto;
            margin-right: 8px;
        }

        .info-box {
            background-color: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .step {
            flex: 1;
            text-align: center;
            padding: 10px;
            position: relative;
        }

        .step:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 20px;
            right: -50%;
            width: 100%;
            height: 2px;
            background-color: #e0e0e0;
            z-index: -1;
        }

        .step.active .step-number {
            background-color: #667eea;
            color: white;
        }

        .step.completed .step-number {
            background-color: #4caf50;
            color: white;
        }

        .step.completed:not(:last-child)::after {
            background-color: #4caf50;
        }

        .step-number {
            display: inline-block;
            width: 40px;
            height: 40px;
            line-height: 40px;
            border-radius: 50%;
            background-color: #e0e0e0;
            color: #666;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .step-label {
            font-size: 0.9rem;
            color: #666;
        }

        /* Basket styles */
        .basket-items {
            margin-top: 15px;
        }

        .empty-basket {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }

        .basket-item {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #fafafa;
        }

        .basket-item-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .basket-item-title {
            flex: 1;
        }

        .basket-item-material {
            color: #666;
            font-size: 0.9rem;
        }

        .remove-btn {
            background: #ff5252;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            transition: background-color 0.2s;
        }

        .remove-btn:hover {
            background: #d32f2f;
            transform: none;
        }

        .basket-item-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .basket-item-specs {
            font-size: 0.9rem;
            color: #666;
        }

        .basket-item-finishes {
            color: #667eea;
        }

        .basket-item-quantity {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .basket-item-quantity label {
            margin: 0;
            font-size: 0.9rem;
        }

        .quantity-input {
            width: 80px !important;
            padding: 5px 8px !important;
            font-size: 0.9rem;
        }

        .basket-item-price {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 8px;
            border-top: 1px solid #e0e0e0;
            font-size: 0.9rem;
        }

        .unit-price {
            color: #666;
        }

        .line-total {
            font-weight: 600;
            color: #667eea;
        }

        .basket-total {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #667eea;
        }

        .basket-total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            color: #667eea;
        }

        .basket-actions {
            margin-top: 15px;
        }

        .basket-actions-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .basket-checkout-btn {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 11px 16px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .basket-checkout-btn:hover:not(:disabled) {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .clear-basket-btn {
            background: #ff5252;
            width: 100%;
        }

        .clear-basket-icon-btn {
            background: #f5f5f5;
            color: #999;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            min-width: unset;
            padding: 0;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s, color 0.2s;
        }

        .clear-basket-icon-btn:hover {
            background: #ff5252;
            color: white;
            transform: none;
            box-shadow: none;
        }

        .clear-basket-btn:hover {
            background: #d32f2f;
        }

        .add-to-basket-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .basket-quantity-input {
            width: 100%;
            margin-bottom: 5px;
        }

        .add-to-basket-btn {
            width: 100%;
            background: #4caf50;
        }

        .add-to-basket-btn:hover:not(:disabled) {
            background: #388e3c;
        }

        .close-msg-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: transparent;
            color: #666;
            border: none;
            padding: 0;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 1.5rem;
            line-height: 1;
            cursor: pointer;
        }

        .close-msg-btn:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: none;
        }

        .info-box {
            position: relative;
            padding-right: 35px;
        }

        /* App Navigation Styles */
        .app-navigation {
            background: white;
            padding: 0 max(20px, calc((100% - 1200px) / 2));
            display: flex;
            gap: 0;
            border-bottom: 2px solid #e0e0e0;
        }

        .app-navigation .nav-link {
            padding: 10px 20px;
            background: transparent;
            color: #555;
            border: none;
            border-bottom: 3px solid transparent;
            border-radius: 0;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            margin-bottom: -2px;
        }

        .app-navigation .nav-link:hover {
            background: #f5f7ff;
            color: #667eea;
        }

        .app-navigation .nav-link:hover:not(:disabled) {
            transform: none;
            box-shadow: none;
        }

        .app-navigation .nav-link.active {
            background: transparent;
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }

        /* ─── Product Type & Format Selectors ────────────────── */

        .product-selectors {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f7ff;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }

        .selector-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .selector-group label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #555;
        }

        .product-type-select,
        .format-select {
            padding: 8px 10px;
            font-size: 0.95rem;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
        }

        @media (max-width: 768px) {
            .product-selectors {
                flex-direction: column;
            }
        }

        /* Calendar Builder Styles */
        .calendar-builder-app {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .calendar-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .calendar-header h1 {
            color: #667eea;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .calendar-header p {
            color: #666;
            font-size: 1rem;
        }

        .calendar-main-content {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            min-height: 600px;
        }

        @media (max-width: 1200px) {
            .calendar-main-content {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar Styles */
        .calendar-sidebar {
            border-right: 2px solid #e0e0e0;
            padding-right: 20px;
            max-height: 700px;
            overflow-y: auto;
        }

        .calendar-controls-card {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 15px;
        }

        .calendar-controls-card h4,
        .calendar-controls-card h5 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .calendar-controls-card hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #e0e0e0;
        }

        /* ─── Unified Element Editor ─────────────────────────── */

        .element-editor-section {
            margin-bottom: 20px;
        }

        /* Add-element button row */
        .add-element-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .add-element-btn {
            flex: 1 1 auto;
            min-width: 70px;
            padding: 6px 8px;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .add-photo-btn { background: #667eea; }
        .add-text-btn  { background: #4caf50; }
        .add-rect-btn  { background: #ff9800; }
        .add-line-btn  { background: #795548; }
        .add-clipart-btn { background: #9c27b0; }

        /* Element list */
        .elements-list {
            max-height: 220px;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        .empty-elements {
            text-align: center;
            color: #999;
            padding: 15px;
            font-style: italic;
            font-size: 0.9rem;
        }

        .element-item {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 6px 8px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .element-item:hover {
            border-color: #b0b8f0;
        }

        .element-item.selected {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .element-item-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .element-icon {
            width: 22px;
            text-align: center;
            font-size: 0.9rem;
        }

        .element-label {
            flex: 1;
            font-size: 0.85rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .element-actions {
            display: flex;
            gap: 2px;
        }

        .element-action-btn {
            padding: 2px 5px;
            font-size: 0.75rem;
            min-width: 22px;
            background: #e0e0e0;
            color: #333;
            border-radius: 4px;
        }

        .element-action-btn:hover {
            background: #667eea;
            color: white;
            transform: none;
        }

        .element-delete-btn {
            background: #ffcdd2;
            color: #c62828;
        }

        .element-delete-btn:hover {
            background: #ff5252;
            color: white;
        }

        /* Element form (type-specific editor) */
        .element-form {
            background: #f0f0f0;
            border-radius: 6px;
            padding: 12px;
            margin-top: 10px;
        }

        .element-form h5 {
            margin-bottom: 10px;
        }

        .control-group {
            margin-bottom: 8px;
        }

        .control-group label {
            display: block;
            margin-bottom: 3px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .control-group input,
        .control-group select {
            width: 100%;
            padding: 5px 6px;
            font-size: 0.85rem;
        }

        .control-row {
            display: flex;
            gap: 8px;
        }

        .control-group.half {
            flex: 1;
        }

        .rotation-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rotation-slider {
            flex: 1;
        }

        .rotation-value {
            font-size: 0.85rem;
            min-width: 35px;
            text-align: right;
        }

        /* Text formatting toolbar */
        .text-format-row {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .format-btn {
            padding: 4px 8px;
            font-size: 0.8rem;
            min-width: 28px;
            background: #e0e0e0;
            color: #333;
            border-radius: 4px;
            text-align: center;
        }

        .format-btn:hover {
            background: #b8b8f0;
            transform: none;
        }

        .format-btn.active {
            background: #667eea;
            color: white;
        }

        .format-italic {
            font-style: italic;
        }

        .format-separator {
            width: 1px;
            height: 20px;
            background: #ccc;
            margin: 0 2px;
        }

        .done-editing-btn {
            width: 100%;
            margin-top: 10px;
        }

        .info-hint {
            font-size: 0.8rem;
            color: #888;
            font-style: italic;
            margin-bottom: 8px;
        }

        /* Photo action buttons and zoom controls */
        .photo-action-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }

        .photo-action-buttons button {
            flex: 1;
            padding: 6px 8px;
            font-size: 0.8rem;
        }

        .zoom-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .zoom-slider {
            flex: 1;
        }

        .zoom-btn {
            width: 28px;
            height: 28px;
            padding: 0;
            font-size: 16px;
            font-weight: bold;
            background: #e0e0e0;
            color: #333;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .zoom-btn:hover {
            background: #667eea;
            color: white;
            transform: none;
        }

        .zoom-value {
            font-size: 0.8rem;
            min-width: 38px;
            text-align: right;
        }

        /* ─── Background & Template Editor ───────────────────── */

        .background-editor-section {
            margin-bottom: 10px;
        }

        .template-select {
            width: 100%;
            padding: 6px;
        }

        .bg-image-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bg-upload-btn {
            width: 100%;
            padding: 8px;
            font-size: 0.85rem;
            background: #2196f3;
        }

        .bg-upload-btn:hover {
            background: #1976d2;
        }

        .bg-reset-btn {
            width: 100%;
            padding: 6px;
            font-size: 0.8rem;
            background: #e0e0e0;
            color: #333;
        }

        .bg-reset-btn:hover {
            background: #ccc;
            transform: none;
        }

        .predefined-textures {
            padding: 4px 0;
        }

        /* ─── Calendar Canvas ────────────────────────────────── */

        .calendar-canvas-area {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: #f5f5f5;
            border-radius: 8px;
            padding: 20px;
        }

        .calendar-canvas-container {
            width: 100%;
            max-width: 600px;
        }

        .calendar-canvas {
            width: 100%;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .calendar-page {
            position: relative;
            width: 100%;
            height: 600px;
            overflow: hidden;
        }

        .calendar-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Template text (locked month/day labels) */
        .calendar-text-field {
            position: absolute;
            z-index: 1;
            padding: 2px 4px;
            white-space: nowrap;
        }

        .calendar-text-field.locked {
            opacity: 0.7;
            pointer-events: none;
        }

        /* ─── Canvas Elements (shared) ───────────────────────── */

        .calendar-element {
            position: absolute;
            border: 2px dashed transparent;
            transition: border-color 0.15s;
            cursor: move;
        }

        .calendar-element:hover {
            border-color: rgba(102, 126, 234, 0.5);
        }

        .calendar-element.selected {
            border-color: #667eea;
            border-style: solid;
        }

        /* Photo element */
        .calendar-photo img {
            pointer-events: none;
        }

        /* Text element with frame */
        .calendar-text-element {
            min-width: 30px;
            min-height: 20px;
        }

        .text-element-content {
            padding: 2px 4px;
            pointer-events: none;
        }

        /* Shape element */
        .calendar-shape-element {
            min-width: 10px;
            min-height: 4px;
        }

        /* Clipart element */
        .calendar-clipart-element img {
            pointer-events: none;
        }

        /* ─── Resize Handles ─────────────────────────────────── */

        .resize-handles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .resize-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #667eea;
            border: 2px solid white;
            border-radius: 2px;
            pointer-events: all;
            z-index: 20;
        }

        .resize-handle-nw { top: -5px;    left: -5px;   cursor: nw-resize; }
        .resize-handle-ne { top: -5px;    right: -5px;  cursor: ne-resize; }
        .resize-handle-sw { bottom: -5px; left: -5px;   cursor: sw-resize; }
        .resize-handle-se { bottom: -5px; right: -5px;  cursor: se-resize; }

        .resize-handle-n {
            top: -5px; left: 50%; transform: translateX(-50%);
            cursor: n-resize;
        }
        .resize-handle-s {
            bottom: -5px; left: 50%; transform: translateX(-50%);
            cursor: s-resize;
        }
        .resize-handle-e {
            top: 50%; right: -5px; transform: translateY(-50%);
            cursor: e-resize;
        }
        .resize-handle-w {
            top: 50%; left: -5px; transform: translateY(-50%);
            cursor: w-resize;
        }

        /* ─── Rotation Buttons (left and right) ──────────────── */

        .rotate-buttons-container {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            z-index: 30;
            pointer-events: all;
        }

        .rotate-btn {
            width: 28px;
            height: 28px;
            background: #667eea;
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            z-index: 30;
            pointer-events: all;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            line-height: 1;
            padding: 0;
        }

        .rotate-btn:hover {
            background: #764ba2;
            transform: scale(1.15);
        }

        /* ─── Sidebar Tabs ───────────────────────────────────── */

        .sidebar-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 12px;
            border-bottom: 2px solid #e0e0e0;
        }

        .sidebar-tab-btn {
            flex: 1;
            padding: 8px 12px;
            font-size: 0.85rem;
            background: #f0f0f0;
            color: #555;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: -2px;
            border-radius: 6px 6px 0 0;
        }

        .sidebar-tab-btn:hover {
            background: #e0e0f0;
            transform: none;
        }

        .sidebar-tab-btn.active {
            background: white;
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }

        /* ─── Horizontal Page Navigation Strip ──────────────── */

        .page-navigation-strip {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding: 12px 15px;
            background: #f9f9f9;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }

        .nav-strip-btn {
            padding: 8px 14px;
            font-size: 1.1rem;
            min-width: 40px;
            flex-shrink: 0;
        }

        .nav-strip-btn:disabled {
            background: #cccccc !important;
            color: #666666 !important;
            opacity: 1;
        }

        .page-navigation-strip .page-indicator {
            flex-shrink: 0;
            min-width: 60px;
        }

        .page-thumbnails-strip {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            flex: 1;
            padding: 4px 0;
            scrollbar-width: thin;
        }

        .page-thumbnails-strip::-webkit-scrollbar {
            height: 6px;
        }

        .page-thumbnails-strip::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .page-thumbnail-item {
            flex-shrink: 0;
            width: 56px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 6px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-thumbnail-item:hover {
            border-color: #667eea;
        }

        .page-thumbnail-item.active {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .page-thumbnail-item .thumbnail-number {
            font-size: 1rem;
            font-weight: bold;
            color: #667eea;
        }

        .page-thumbnail-item .thumbnail-label {
            font-size: 0.65rem;
            color: #666;
            margin-top: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ─── Calendar Footer ────────────────────────────────── */

        .calendar-footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .reset-btn {
            background: #ff5252;
        }

        .reset-btn:hover {
            background: #d32f2f;
        }

        .preview-btn {
            background: #2196f3;
        }

        .preview-btn:hover {
            background: #1976d2;
        }

        /* ─── Nav Basket Button ───────────────────────────────── */

        .nav-basket-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 12px;
        }

        .nav-basket-btn-hidden {
            display: none !important;
        }

        .nav-basket-content {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .basket-icon {
            font-size: 1.1rem;
        }

        .basket-badge {
            background: #ff5252;
            color: white;
            border-radius: 50%;
            min-width: 18px;
            height: 18px;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            padding: 0 3px;
        }

        @media (max-width: 480px) {
            .basket-btn-label {
                display: none;
            }
        }

        @media (max-width: 600px) {
            .top-bar {
                gap: 8px;
                padding: 0 12px;
            }
            .top-bar-logo {
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .top-bar-user > span:not(.top-bar-user-icon) {
                display: none;
            }
            .language-selector select {
                min-width: auto;
                padding: 4px;
                font-size: 0.8rem;
            }
            .top-bar .nav-basket-btn {
                padding: 5px 8px;
            }
            .app-navigation {
                padding: 0 12px;
            }
        }

        /* ─── Basket Drawer ───────────────────────────────────── */

        .basket-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 250;
            display: none;
        }

        .basket-overlay.visible {
            display: block;
        }

        .basket-drawer {
            position: fixed;
            top: 0;
            right: -420px;
            width: 400px;
            max-width: 100vw;
            height: 100vh;
            background: #f5f7ff;
            z-index: 300;
            box-shadow: -4px 0 25px rgba(0, 0, 0, 0.2);
            overflow-y: auto;
            transition: right 0.3s ease;
            padding: 20px;
        }

        .basket-drawer.open {
            right: 0;
        }

        .basket-drawer-close-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .basket-drawer-close {
            background: #e0e0e0;
            color: #333;
            width: 32px;
            height: 32px;
            padding: 0;
            border-radius: 50%;
            font-size: 1.2rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: unset;
        }

        .basket-drawer-close:hover:not(:disabled) {
            background: #ff5252;
            color: white;
            transform: none;
            box-shadow: none;
        }

        /* ─── Mobile Price Footer ─────────────────────────────── */

        .price-mobile-summary {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px 12px 0 0;
            gap: 12px;
        }

        .price-mobile-total {
            font-size: 1.4rem;
            font-weight: bold;
            flex: 1;
        }

        .price-mobile-status {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        .price-mobile-status.valid {
            background: rgba(76, 175, 80, 0.9);
        }

        .price-mobile-status.invalid {
            background: rgba(244, 67, 54, 0.9);
        }

        .price-expand-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            padding: 0;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            min-width: unset;
        }

        .price-expand-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.35);
            transform: none;
            box-shadow: none;
        }

        @media (max-width: 768px) {
            .price-section {
                position: fixed !important;
                bottom: 0;
                left: 0;
                right: 0;
                top: auto !important;
                z-index: 100;
                background: white;
                box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
                max-height: 75vh;
                overflow-y: auto;
                border-radius: 12px 12px 0 0;
                flex-direction: column;
            }

            .price-section .card {
                border-radius: 0;
                box-shadow: none;
                border-top: 1px solid #e0e0e0;
            }

            .price-mobile-summary {
                display: flex;
            }

            .price-detail-content {
                display: none;
                overflow: visible;
            }

            .price-detail-content > .card:first-child {
                overflow-y: visible;
            }

            .price-section.price-expanded .price-detail-content {
                display: block;
            }

            .main-content {
                padding-bottom: 80px;
            }
        }

        /* ─── Artwork Section ─────────────────────────────────── */

        .artwork-section--hidden {
            display: none !important;
        }

        .artwork-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .artwork-option {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            transition: border-color 0.2s;
        }

        .artwork-option:has(input[type="radio"]:checked) {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .artwork-option-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-weight: 500;
            color: #333;
            margin-bottom: 0;
            gap: 8px;
        }

        .artwork-option-label input[type="radio"] {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        .upload-file-area {
            margin-top: 10px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 6px;
        }

        .upload-file-area--hidden {
            display: none !important;
        }

        .artwork-file-input {
            width: 100%;
            margin-bottom: 6px;
        }

        .upload-hint {
            font-size: 0.82rem;
            color: #777;
            font-style: italic;
        }

        .uploaded-file-name {
            font-size: 0.88rem;
            color: #388e3c;
            font-weight: 500;
        }

        .open-editor-area {
            margin-top: 10px;
        }

        .open-editor-area--hidden {
            display: none !important;
        }

        .open-editor-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }

        .open-editor-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* ─── Basket Item Artwork Info ────────────────────────── */

        .basket-item-artwork {
            margin-top: 6px;
            font-size: 0.83rem;
            color: #555;
            border-top: 1px dashed #e0e0e0;
            padding-top: 5px;
        }

        .artwork-pending {
            color: #e65100;
            font-style: italic;
        }

        /* ─── Checkout Page ───────────────────────────────────── */

        .app-navigation--hidden {
            display: none !important;
        }

        .checkout-page {
            max-width: 720px;
            margin: 0 auto;
        }

        .checkout-card {
            margin-bottom: 20px;
        }

        .checkout-step-title {
            font-size: 1.4rem;
            color: #667eea;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .checkout-section-title {
            font-size: 1rem;
            font-weight: 600;
            color: #444;
            margin: 20px 0 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #e0e0e0;
        }

        /* ─── Step bar ────────────────────────────────────────── */

        .checkout-steps {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            gap: 4px;
        }

        .checkout-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex: 1;
        }

        .checkout-step-num {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            background: #e0e0e0;
            color: #999;
            transition: background 0.2s, color 0.2s;
        }

        .checkout-step--active .checkout-step-num {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .checkout-step--done .checkout-step-num {
            background: #4caf50;
            color: white;
        }

        .checkout-step-label {
            font-size: 0.75rem;
            color: #999;
            text-align: center;
            white-space: nowrap;
        }

        .checkout-step--active .checkout-step-label {
            color: #667eea;
            font-weight: 600;
        }

        .checkout-step--done .checkout-step-label {
            color: #4caf50;
        }

        @media (max-width: 500px) {
            .checkout-step-label { display: none; }
            .checkout-steps { padding: 12px; }
        }

        /* ─── Auth options ────────────────────────────────────── */

        .checkout-auth-options {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        @media (max-width: 600px) {
            .checkout-auth-options { flex-direction: column; }
        }

        .checkout-auth-option {
            flex: 1;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checkout-auth-option h3 {
            margin: 0;
            font-size: 1rem;
            color: #444;
        }

        .checkout-auth-desc {
            font-size: 0.88rem;
            color: #666;
            margin: 0;
        }

        .checkout-auth-divider {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            color: #aaa;
            font-style: italic;
            align-self: center;
            padding: 0 4px;
        }

        /* ─── Form rows ───────────────────────────────────────── */

        .checkout-form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 520px) {
            .checkout-form-row { grid-template-columns: 1fr; }
        }

        /* ─── Discount row ────────────────────────────────────── */

        .checkout-discount-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .checkout-discount-input {
            flex: 1;
        }

        .checkout-discount-apply {
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ─── Note textarea ───────────────────────────────────── */

        .checkout-note {
            width: 100%;
            min-height: 80px;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
        }

        .checkout-note:focus {
            outline: none;
            border-color: #667eea;
        }

        /* ─── Delivery / Payment option cards ─────────────────── */

        .checkout-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checkout-option {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 14px 16px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .checkout-option:hover:not(.checkout-option--future) {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .checkout-option--selected {
            border-color: #667eea;
            background: #f0f3ff;
        }

        .checkout-option--future {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .checkout-option-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .checkout-option-desc {
            font-size: 0.87rem;
            color: #666;
        }

        .checkout-option-price {
            font-size: 0.87rem;
            font-weight: 600;
            color: #667eea;
            margin-top: 4px;
        }

        /* ─── Payment note ────────────────────────────────────── */

        .checkout-payment-note {
            font-size: 0.9rem;
            color: #555;
            background: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 16px;
        }

        /* ─── Summary ─────────────────────────────────────────── */

        .checkout-summary-items {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 6px;
        }

        .checkout-summary-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            padding: 6px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .checkout-summary-item-name {
            color: #444;
        }

        .checkout-summary-item-price {
            font-weight: 600;
            color: #667eea;
        }

        .checkout-summary-row {
            font-size: 0.93rem;
            color: #555;
            padding: 4px 0;
            display: flex;
            justify-content: space-between;
        }

        .checkout-summary-note {
            font-style: italic;
        }

        .checkout-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            color: #667eea;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 2px solid #667eea;
        }

        .checkout-qr-note {
            margin-top: 14px;
        }

        /* ─── Navigation buttons ──────────────────────────────── */

        .checkout-nav {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 24px;
        }

        .checkout-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            min-width: 160px;
        }

        .checkout-btn:hover:not(:disabled) {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .checkout-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .checkout-submit-btn {
            background: linear-gradient(135deg, #43a047 0%, #2e7d32 100%);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #555;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }

        /* ─── VAT / company fields ────────────────────────────── */

        .checkout-vat-fields--hidden {
            display: none !important;
        }

        /* ─── Shipping address section (Step 3) ───────────────── */

        .checkout-shipping-addr-section {
            margin-top: 20px;
        }

        .checkout-shipping-addr-section--hidden {
            display: none !important;
        }

        .checkout-diff-addr-row {
            margin-bottom: 12px;
        }

        .checkout-diff-addr-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            color: #444;
            font-weight: 500;
        }

        .checkout-diff-addr-label input[type="checkbox"] {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        .checkout-addr-same {
            font-size: 0.9rem;
            color: #666;
            background: #f5f7ff;
            border: 1px solid #d0d8ff;
            border-radius: 6px;
            padding: 8px 12px;
            margin-bottom: 8px;
        }

        .checkout-addr-same--hidden {
            display: none !important;
        }

        .checkout-diff-addr-fields--hidden {
            display: none !important;
        }

        /* ─── Discount applied message ────────────────────────── */

        .checkout-discount-applied {
            font-size: 0.87rem;
            color: #388e3c;
            font-weight: 500;
            margin-top: 6px;
        }

        /* ═══════════════════════════════════════════════════════════
           Manufacturing UI
           ═══════════════════════════════════════════════════════════ */

        .mfg-app {
            --mfg-sidebar-width: 220px;
            display: flex;
            min-height: calc(100vh - var(--header-total-height));
        }

        /* ─── Sidebar ─────────────────────────────────────────── */

        .mfg-sidebar {
            width: var(--mfg-sidebar-width);
            min-width: var(--mfg-sidebar-width);
            background: #1e293b;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        .mfg-sidebar-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 18px 18px 14px;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            border-bottom: 1px solid #334155;
        }

        .mfg-sidebar-icon { font-size: 1.3rem; }

        .mfg-nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            border: none;
            background: none;
            color: #94a3b8;
            font-size: 0.95rem;
            cursor: pointer;
            text-align: left;
            transition: background 0.15s, color 0.15s;
            width: 100%;
        }

        .mfg-nav-item:hover { background: #334155; color: #e2e8f0; }
        .mfg-nav-item.active { background: #2563eb; color: #fff; font-weight: 600; }

        .mfg-nav-icon { font-size: 1.1rem; width: 24px; text-align: center; }

        /* ─── Main content ────────────────────────────────────── */

        .mfg-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: #f0f2f5;
            max-width: calc(100% - var(--mfg-sidebar-width));
        }

        .mfg-view-header { margin-bottom: 16px; }
        .mfg-view-header h2 { font-size: 1.4rem; color: #1e293b; margin: 0 0 4px; }
        .mfg-view-subtitle { color: #64748b; font-size: 0.9rem; margin: 0; }

        /* ─── Toolbar (search + filters) ──────────────────────── */

        .mfg-toolbar {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }

        .mfg-search-field { flex: 1; max-width: 400px; }

        .mfg-search-input {
            width: 100%;
            padding: 8px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s;
            background: #fff;
        }

        .mfg-search-input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

        .mfg-station-filters {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .mfg-filter-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: #64748b;
            margin-right: 2px;
        }

        .mfg-station-toggle {
            padding: 3px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            background: #fff;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .mfg-station-toggle:hover { border-color: #93c5fd; background: #f0f5ff; }
        .mfg-station-toggle.active { background: #2563eb; color: #fff; border-color: #2563eb; }

        /* ─── Table layout (table + side panel) ───────────────── */

        .mfg-table-layout {
            display: flex;
            gap: 16px;
            min-height: 400px;
        }

        .mfg-table-container {
            flex: 1;
            min-width: 0;
            overflow-x: auto;
        }

        /* ─── Table ───────────────────────────────────────────── */

        .mfg-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .mfg-table-compact { font-size: 0.82rem; }

        .mfg-th {
            padding: 10px 12px;
            text-align: left;
            background: #f8fafc;
            color: #475569;
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border-bottom: 2px solid #e2e8f0;
            white-space: nowrap;
            cursor: default;
        }

        .mfg-td {
            padding: 8px 12px;
            border-bottom: 1px solid #f1f5f9;
            color: #1e293b;
            vertical-align: middle;
        }

        .mfg-td-num { text-align: center; font-weight: 600; color: #64748b; min-width: 36px; }
        .mfg-td-order { font-weight: 700; color: #2563eb; white-space: nowrap; }
        .mfg-td-material { color: #64748b; font-size: 0.82rem; max-width: 150px; }
        .mfg-td-date { white-space: nowrap; color: #64748b; font-size: 0.82rem; }
        .mfg-td-actions { white-space: nowrap; }

        .mfg-tr { cursor: pointer; transition: background 0.1s; }
        .mfg-tr:hover { background: #f8fafc; }
        .mfg-tr.selected { background: #eff6ff; }
        .mfg-tr.in-progress { background: #f8faff; }
        .mfg-tr.selected.in-progress { background: #dbeafe; }
        .mfg-tr.pending { }

        .mfg-station-chip {
            display: inline-block;
            padding: 2px 8px;
            background: #f1f5f9;
            border-radius: 10px;
            font-size: 0.78rem;
            white-space: nowrap;
        }

        .mfg-inline-actions { display: flex; gap: 4px; }

        /* ─── Side panel ──────────────────────────────────────── */

        .mfg-side-panel {
            width: 380px;
            min-width: 340px;
            max-height: calc(100vh - var(--header-total-height) - 140px);
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: #fff;
        }

        .mfg-side-panel-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #94a3b8;
            font-size: 0.92rem;
        }

        .mfg-detail-content { padding: 16px 18px; }

        .mfg-detail-close-row { display: flex; justify-content: flex-end; margin-bottom: 4px; }

        .mfg-detail-close {
            background: none;
            border: none;
            font-size: 1.1rem;
            color: #94a3b8;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .mfg-detail-close:hover { background: #f1f5f9; color: #475569; }

        .mfg-detail-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .mfg-detail-header h3 { font-size: 1.1rem; color: #1e293b; margin: 0; }

        .mfg-detail-customer { color: #64748b; font-size: 0.9rem; margin-bottom: 2px; }

        .mfg-detail-meta { color: #94a3b8; font-size: 0.82rem; margin-bottom: 12px; }

        .mfg-detail-section { margin-bottom: 14px; }

        .mfg-detail-section h4 {
            font-size: 0.82rem;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin: 0 0 8px;
        }

        .mfg-detail-row {
            display: flex;
            gap: 8px;
            padding: 3px 0;
            font-size: 0.88rem;
        }

        .mfg-detail-label { color: #64748b; min-width: 70px; font-weight: 500; }

        .mfg-detail-item-card {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 8px;
        }

        /* ─── Files list ──────────────────────────────────────── */

        .mfg-files-list { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }

        .mfg-file-link {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.82rem;
            color: #2563eb;
            text-decoration: none;
            transition: background 0.1s;
        }

        .mfg-file-link:hover { background: #f0f5ff; }
        .mfg-file-icon { font-size: 1rem; }
        .mfg-file-type { color: #94a3b8; font-size: 0.75rem; margin-left: auto; text-transform: uppercase; }

        /* ─── Timeline ────────────────────────────────────────── */

        .mfg-timeline { display: flex; flex-direction: column; gap: 0; margin-bottom: 10px; }

        .mfg-timeline-step {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 6px 0;
            position: relative;
        }

        .mfg-timeline-step::before {
            content: '';
            position: absolute;
            left: 5px;
            top: 18px;
            bottom: -6px;
            width: 2px;
            background: #e2e8f0;
        }

        .mfg-timeline-step:last-child::before { display: none; }

        .mfg-timeline-step.completed::before { background: #22c55e; }
        .mfg-timeline-step.in-progress::before { background: #2563eb; }

        .mfg-timeline-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e2e8f0;
            border: 2px solid #e2e8f0;
            flex-shrink: 0;
            z-index: 1;
            margin-top: 2px;
        }

        .mfg-timeline-step.completed .mfg-timeline-dot { background: #22c55e; border-color: #22c55e; }
        .mfg-timeline-step.in-progress .mfg-timeline-dot { background: #fff; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }
        .mfg-timeline-step.ready .mfg-timeline-dot { background: #fef08a; border-color: #eab308; }
        .mfg-timeline-step.failed .mfg-timeline-dot { background: #fca5a5; border-color: #ef4444; }

        .mfg-timeline-info { display: flex; flex-direction: column; gap: 1px; flex: 1; }
        .mfg-timeline-station { font-size: 0.85rem; color: #1e293b; font-weight: 500; }
        .mfg-timeline-role { font-size: 0.78rem; color: #94a3b8; }

        .mfg-step-status-sm {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 8px;
            width: fit-content;
        }

        .mfg-step-status-sm.completed { background: #dcfce7; color: #16a34a; }
        .mfg-step-status-sm.in-progress { background: #dbeafe; color: #2563eb; }
        .mfg-step-status-sm.ready { background: #fef9c3; color: #a16207; }
        .mfg-step-status-sm.waiting { background: #f1f5f9; color: #94a3b8; }
        .mfg-step-status-sm.failed { background: #fef2f2; color: #dc2626; }
        .mfg-step-status-sm.skipped { background: #f1f5f9; color: #94a3b8; }

        /* ─── Mini pipeline dots ──────────────────────────────── */

        .mfg-mini-pipeline { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 6px; }

        .mfg-mini-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e2e8f0;
            display: inline-block;
        }

        .mfg-mini-dot.completed { background: #22c55e; }
        .mfg-mini-dot.in-progress { background: #2563eb; }
        .mfg-mini-dot.ready { background: #eab308; }
        .mfg-mini-dot.waiting { background: #e2e8f0; }

        /* ─── Other items in order ────────────────────────────── */

        .mfg-other-item {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 6px;
        }

        .mfg-other-item-desc { font-size: 0.85rem; color: #1e293b; font-weight: 500; }
        .mfg-other-item-meta { font-size: 0.78rem; color: #94a3b8; }

        /* ─── Priority & Status badges ────────────────────────── */

        .mfg-priority-badge {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 10px;
            display: inline-block;
        }

        .mfg-priority-badge.rush { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }
        .mfg-priority-badge.normal { background: #f0f9ff; color: #2563eb; border: 1px solid #93c5fd; }
        .mfg-priority-badge.low { background: #f8fafc; color: #94a3b8; border: 1px solid #cbd5e1; }

        .mfg-status-badge {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 10px;
            display: inline-block;
        }

        .mfg-status-badge.in-progress { background: #dbeafe; color: #2563eb; }
        .mfg-status-badge.ready { background: #fef9c3; color: #a16207; }
        .mfg-status-badge.completed { background: #dcfce7; color: #16a34a; }
        .mfg-status-badge.failed { background: #fef2f2; color: #dc2626; }

        .mfg-approval-badge {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .mfg-approval-pending { background: #fef9c3; color: #a16207; border: 1px solid #fde047; }
        .mfg-approval-approved { background: #dcfce7; color: #16a34a; border: 1px solid #86efac; }
        .mfg-approval-rejected { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }
        .mfg-approval-changesrequested { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }

        /* ─── Priority selector ───────────────────────────────── */

        .mfg-priority-selector { display: flex; gap: 8px; }

        .mfg-priority-btn {
            padding: 5px 14px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            background: #fff;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .mfg-priority-btn:hover { border-color: #93c5fd; }
        .mfg-priority-btn.active.mfg-priority-rush { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }
        .mfg-priority-btn.active.mfg-priority-normal { background: #eff6ff; border-color: #93c5fd; color: #2563eb; }
        .mfg-priority-btn.active.mfg-priority-low { background: #f8fafc; border-color: #cbd5e1; color: #64748b; }

        /* ─── Action buttons ──────────────────────────────────── */

        .mfg-detail-actions {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid #e2e8f0;
            flex-wrap: wrap;
        }

        .mfg-btn {
            padding: 7px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        .mfg-btn:active { transform: scale(0.97); }

        .mfg-btn-sm { padding: 4px 10px; font-size: 0.78rem; }

        .mfg-btn-primary { background: #2563eb; color: #fff; }
        .mfg-btn-primary:hover { background: #1d4ed8; }
        .mfg-btn-secondary { background: #e2e8f0; color: #1e293b; }
        .mfg-btn-secondary:hover { background: #cbd5e1; }
        .mfg-btn-warning { background: #f59e0b; color: #fff; }
        .mfg-btn-warning:hover { background: #d97706; }
        .mfg-btn-danger { background: #ef4444; color: #fff; }
        .mfg-btn-danger:hover { background: #dc2626; }

        .mfg-empty-queue {
            text-align: center;
            color: #94a3b8;
            padding: 40px;
            font-size: 0.95rem;
            background: #fff;
            border: 1px dashed #e2e8f0;
            border-radius: 8px;
        }

        /* ─── Progress bars ───────────────────────────────────── */

        .mfg-progress-bar-container {
            position: relative;
            height: 5px;
            background: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 3px;
        }

        .mfg-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #22c55e);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .mfg-progress-text { font-size: 0.72rem; color: #94a3b8; }

        /* ─── Order notes ─────────────────────────────────────── */

        .mfg-order-notes {
            font-size: 0.85rem;
            color: #475569;
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 6px;
            padding: 8px 12px;
            margin: 0;
        }

        .mfg-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: #f8fafc;
            border-radius: 5px;
            margin-bottom: 4px;
        }

        .mfg-item-desc { font-size: 0.85rem; color: #1e293b; }
        .mfg-item-qty { font-size: 0.82rem; color: #64748b; font-weight: 600; }

        .mfg-step-component { font-size: 0.78rem; color: #94a3b8; margin-left: 4px; }

        /* ─── Dashboard ───────────────────────────────────────── */

        .mfg-dashboard-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .mfg-summary-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: #fff;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            min-width: 150px;
            flex: 1;
        }

        .mfg-summary-icon { font-size: 1.4rem; }

        .mfg-summary-body { display: flex; flex-direction: column; }
        .mfg-summary-value { font-size: 1.4rem; font-weight: 700; color: #1e293b; line-height: 1; }
        .mfg-summary-label { font-size: 0.78rem; color: #64748b; margin-top: 2px; }

        .mfg-card-blue { border-left: 4px solid #2563eb; }
        .mfg-card-amber { border-left: 4px solid #f59e0b; }
        .mfg-card-green { border-left: 4px solid #22c55e; }
        .mfg-card-gray { border-left: 4px solid #94a3b8; }
        .mfg-card-red { border-left: 4px solid #ef4444; }
        .mfg-card-teal { border-left: 4px solid #14b8a6; }
        .mfg-card-purple { border-left: 4px solid #8b5cf6; }

        .mfg-dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .mfg-dashboard-section {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 16px 18px;
        }

        .mfg-dashboard-section h3 {
            font-size: 1rem;
            color: #1e293b;
            margin: 0 0 12px;
        }

        /* ─── Station status grid ─────────────────────────────── */

        .mfg-station-status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }

        .mfg-station-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px 12px;
            transition: border-color 0.15s;
        }

        .mfg-station-card.active { border-color: #2563eb; background: #f8faff; }

        .mfg-station-card-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .mfg-station-card-icon { font-size: 1.1rem; }
        .mfg-station-card-name { font-size: 0.78rem; font-weight: 600; color: #1e293b; }

        .mfg-station-card-stats { display: flex; gap: 10px; margin-bottom: 6px; }

        .mfg-station-stat { display: flex; flex-direction: column; align-items: center; }
        .mfg-station-stat-val { font-size: 0.95rem; font-weight: 700; color: #1e293b; }
        .mfg-station-stat-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; }

        .mfg-station-bar-container {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .mfg-station-bar {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #22c55e);
            border-radius: 2px;
        }

        .mfg-station-bar-label {
            font-size: 0.65rem;
            color: #94a3b8;
            margin-top: 2px;
            display: block;
        }

        /* ─── Pipeline steps (order progress view) ────────────── */

        .mfg-progress-list { display: flex; flex-direction: column; gap: 16px; }

        .mfg-progress-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 16px 20px;
        }

        .mfg-progress-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .mfg-progress-order-info { display: flex; align-items: center; gap: 8px; }
        .mfg-order-id { font-weight: 700; font-size: 0.9rem; color: #1e293b; }
        .mfg-order-customer { font-size: 0.85rem; color: #94a3b8; }

        .mfg-pipeline-row { margin-bottom: 14px; padding: 10px 0; border-top: 1px solid #f1f5f9; }
        .mfg-pipeline-row:first-of-type { border-top: none; }

        .mfg-pipeline-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .mfg-pipeline-item-name { font-size: 0.88rem; color: #1e293b; font-weight: 500; }
        .mfg-pipeline-pct { font-size: 0.82rem; font-weight: 700; color: #2563eb; }
        .mfg-pipeline-no-workflow { font-size: 0.82rem; color: #94a3b8; font-style: italic; }

        .mfg-pipeline-steps { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }

        .mfg-pipeline-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px 8px;
            border-radius: 5px;
            min-width: 55px;
            font-size: 0.7rem;
            text-align: center;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            transition: all 0.15s;
        }

        .mfg-pipeline-step.completed { background: #dcfce7; border-color: #86efac; color: #16a34a; }
        .mfg-pipeline-step.in-progress { background: #dbeafe; border-color: #93c5fd; color: #2563eb; }
        .mfg-pipeline-step.ready { background: #fef9c3; border-color: #fde047; color: #a16207; }
        .mfg-pipeline-step.failed { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }
        .mfg-pipeline-step.skipped { background: #f1f5f9; border-color: #cbd5e1; color: #94a3b8; }
        .mfg-pipeline-step.waiting { background: #f8fafc; border-color: #e2e8f0; color: #cbd5e1; }

        .mfg-pipeline-step-icon { font-size: 0.85rem; margin-bottom: 1px; }
        .mfg-pipeline-step-label { line-height: 1.2; }

        /* ─── Employees ───────────────────────────────────────── */

        .mfg-employees-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
        }

        .mfg-employee-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px 18px;
        }

        .mfg-employee-card.inactive { opacity: 0.6; }

        .mfg-employee-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .mfg-employee-avatar { font-size: 1.6rem; }
        .mfg-employee-name { font-size: 1rem; font-weight: 600; color: #1e293b; display: block; }
        .mfg-employee-status { font-size: 0.78rem; color: #94a3b8; }
        .mfg-employee-status.active { color: #16a34a; }

        .mfg-employee-section h4 {
            font-size: 0.82rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin: 0 0 8px;
        }

        .mfg-station-caps { display: flex; flex-wrap: wrap; gap: 5px; }

        .mfg-station-cap {
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            background: #f1f5f9;
            color: #94a3b8;
            border: 1px solid #e2e8f0;
        }

        .mfg-station-cap.enabled { background: #dcfce7; color: #16a34a; border-color: #86efac; }
        .mfg-station-cap-icon { font-size: 0.85rem; }

        /* ─── Mobile responsive ───────────────────────────────── */

        @media (max-width: 768px) {
            .mfg-app { flex-direction: column; }

            .mfg-sidebar {
                width: 100%;
                min-width: 100%;
                flex-direction: row;
                overflow-x: auto;
                padding: 0;
            }

            .mfg-sidebar-header { display: none; }
            .mfg-nav-item { padding: 10px 14px; white-space: nowrap; }
            .mfg-nav-label { font-size: 0.85rem; }

            .mfg-content { max-width: 100%; padding: 14px; }

            .mfg-table-layout { flex-direction: column; }

            .mfg-side-panel {
                width: 100%;
                min-width: 100%;
                max-height: none;
            }

            .mfg-dashboard-grid { grid-template-columns: 1fr; }

            .mfg-dashboard-cards { flex-direction: column; }

            .mfg-station-status-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div id="app-root"></div>

    <script src="main.js"></script>
</body>
</html>
