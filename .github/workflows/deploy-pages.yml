name: Deploy UI to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Build Scala.js UI
        run: sbt ui/fullLinkJS

      - name: Assemble site
        run: |
          mkdir -p _site
          cp modules/ui/src/main/resources/index.html _site/
          cp modules/ui/src/main/resources/*.css _site/
          cp modules/ui/target/scala-*/material-builder-ui-opt/main.js _site/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          clean-exclude: pr-preview
