name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency: preview-${{ github.ref }}

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        if: github.event.action != 'closed'
        uses: actions/checkout@v4

      - name: Set up JDK 17
        if: github.event.action != 'closed'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Mill
        if: github.event.action != 'closed'
        run: |
          curl -fL "https://repo1.maven.org/maven2/com/lihaoyi/mill-dist/1.1.3/mill-dist-1.1.3-mill.sh" -o /usr/local/bin/mill
          chmod +x /usr/local/bin/mill

      - name: Build Scala.js UI
        if: github.event.action != 'closed'
        run: mill ui.fullLinkJS

      - name: Assemble site
        if: github.event.action != 'closed'
        run: |
          mkdir -p _site
          cp modules/ui/src/main/resources/index.html _site/
          cp modules/ui/src/main/resources/*.css _site/
          cp out/ui/fullLinkJS.dest/main.js _site/

      - name: Deploy PR Preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./_site
